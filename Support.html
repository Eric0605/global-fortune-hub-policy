<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Fortune Hub Support</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f1e7;
            --surface: rgba(255, 252, 247, 0.92);
            --surface-strong: #fffdf8;
            --text: #1f1a17;
            --muted: #6f625a;
            --line: rgba(88, 65, 50, 0.14);
            --accent: #b45f2b;
            --accent-deep: #7f3e18;
            --shadow: 0 22px 60px rgba(92, 66, 44, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            line-height: 1.65;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(217, 166, 121, 0.26), transparent 34%),
                linear-gradient(180deg, #fbf6ef 0%, var(--bg) 100%);
        }

        a {
            color: var(--accent-deep);
        }

        .page {
            width: min(920px, calc(100% - 32px));
            margin: 0 auto;
            padding: 48px 0 72px;
        }

        .hero,
        .card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 24px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(8px);
        }

        .hero {
            padding: 40px 32px;
            margin-bottom: 24px;
        }

        .topbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 16px;
        }

        .language-selector {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255, 252, 247, 0.82);
            border: 1px solid var(--line);
            box-shadow: 0 10px 30px rgba(92, 66, 44, 0.08);
        }

        .language-selector label {
            font-size: 0.92rem;
            color: var(--muted);
        }

        .language-selector select {
            border: 0;
            background: transparent;
            color: var(--text);
            font: inherit;
        }

        .eyebrow {
            margin: 0 0 12px;
            font-size: 12px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent);
        }

        h1,
        h2,
        h3 {
            margin: 0;
            line-height: 1.15;
            color: #201612;
        }

        h1 {
            font-size: clamp(2.3rem, 4vw, 4.4rem);
            max-width: 10ch;
        }

        .hero p {
            max-width: 640px;
            margin: 18px 0 0;
            font-size: 1.05rem;
            color: var(--muted);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 24px;
            margin-bottom: 24px;
        }

        .card {
            padding: 28px;
        }

        .contact-link {
            display: inline-block;
            margin-top: 18px;
            padding: 12px 16px;
            border-radius: 999px;
            background: #f3e4d5;
            color: var(--accent-deep);
            text-decoration: none;
            font-weight: 700;
        }

        .meta {
            margin-top: 16px;
            color: var(--muted);
            font-size: 0.96rem;
        }

        ul {
            margin: 18px 0 0;
            padding-left: 20px;
        }

        li + li {
            margin-top: 10px;
        }

        .steps {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
            margin-top: 22px;
        }

        .step {
            padding: 18px;
            border-radius: 18px;
            background: var(--surface-strong);
            border: 1px solid var(--line);
        }

        .step-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            margin-bottom: 12px;
            border-radius: 50%;
            background: #f0d7bf;
            color: var(--accent-deep);
            font-weight: 700;
        }

        .resource-links {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 18px;
        }

        .resource-links a {
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid var(--line);
            text-decoration: none;
            background: rgba(255, 255, 255, 0.7);
        }

        .footer-note {
            margin-top: 22px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        @media (max-width: 760px) {
            .page {
                width: min(100% - 20px, 920px);
                padding: 20px 0 40px;
            }

            .hero,
            .card {
                border-radius: 20px;
            }

            .hero,
            .card {
                padding: 24px 20px;
            }

            .grid,
            .steps {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <div class="topbar">
            <div class="language-selector">
                <label for="lang-select" id="lang-label">Select Language:</label>
                <select id="lang-select">
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                    <option value="zh-Hant">繁體中文</option>
                    <option value="zh-HK">香港中文</option>
                </select>
            </div>
        </div>

        <section class="hero">
            <p class="eyebrow" id="eyebrow">Global Fortune Hub</p>
            <h1 id="hero-title">Support</h1>
            <p id="hero-copy"></p>
        </section>

        <section class="grid">
            <article class="card">
                <h2 id="contact-title"></h2>
                <p id="contact-copy"></p>
                <a class="contact-link" href="mailto:erictthk@gmail.com">erictthk@gmail.com</a>
                <p class="meta" id="contact-meta"></p>
            </article>

            <article class="card">
                <h2 id="topics-title"></h2>
                <ul>
                    <li id="topic-1"></li>
                    <li id="topic-2"></li>
                    <li id="topic-3"></li>
                    <li id="topic-4"></li>
                </ul>
            </article>
        </section>

        <section class="card">
            <h2 id="before-title"></h2>
            <p id="before-copy"></p>
            <div class="steps">
                <div class="step">
                    <div class="step-number">1</div>
                    <h3 id="step1-title"></h3>
                    <p id="step1-copy"></p>
                </div>
                <div class="step">
                    <div class="step-number">2</div>
                    <h3 id="step2-title"></h3>
                    <p id="step2-copy"></p>
                </div>
                <div class="step">
                    <div class="step-number">3</div>
                    <h3 id="step3-title"></h3>
                    <p id="step3-copy"></p>
                </div>
            </div>
            <p class="footer-note" id="footer-note"></p>
        </section>

        <section class="card" style="margin-top: 24px;">
            <h2 id="policies-title"></h2>
            <p id="policies-copy"></p>
            <div class="resource-links">
                <a href="./Privacy.html" id="privacy-link"></a>
                <a href="./Terms.html" id="terms-link"></a>
            </div>
        </section>
    </main>

            "zh-HK": {

        let currentLang = localStorage.getItem("selectedLang") || "en";
        if (!translations[currentLang]) {
            currentLang = "en";
        }

        const elements = {
            langLabel: document.getElementById("lang-label"),
            eyebrow: document.getElementById("eyebrow"),
            heroTitle: document.getElementById("hero-title"),
            heroCopy: document.getElementById("hero-copy"),
            contactTitle: document.getElementById("contact-title"),
            contactCopy: document.getElementById("contact-copy"),
            contactMeta: document.getElementById("contact-meta"),
            topicsTitle: document.getElementById("topics-title"),
            topic1: document.getElementById("topic-1"),
            topic2: document.getElementById("topic-2"),
            topic3: document.getElementById("topic-3"),
            topic4: document.getElementById("topic-4"),
            beforeTitle: document.getElementById("before-title"),
            beforeCopy: document.getElementById("before-copy"),
            step1Title: document.getElementById("step1-title"),
            step1Copy: document.getElementById("step1-copy"),
            step2Title: document.getElementById("step2-title"),
            step2Copy: document.getElementById("step2-copy"),
            step3Title: document.getElementById("step3-title"),
            step3Copy: document.getElementById("step3-copy"),
            footerNote: document.getElementById("footer-note"),
            policiesTitle: document.getElementById("policies-title"),
            policiesCopy: document.getElementById("policies-copy"),
            privacyLink: document.getElementById("privacy-link"),
            termsLink: document.getElementById("terms-link")
        };

        const langSelect = document.getElementById("lang-select");

        function renderContent(lang) {
            const copy = translations[lang] || translations.en;
            document.documentElement.lang = lang;
            document.title = copy.pageTitle;

            Object.keys(elements).forEach(function(key) {
                elements[key].textContent = copy[key];
            });
        }

        langSelect.value = currentLang;
        renderContent(currentLang);

        langSelect.addEventListener("change", function() {
            currentLang = this.value;
            localStorage.setItem("selectedLang", currentLang);
            renderContent(currentLang);
        });

</body>
</html>
